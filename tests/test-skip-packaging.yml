name: Test skip_packaging input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REPOSITORY: test-owner/test-repo
      RUNNER_TOOL_CACHE: /tmp/runner-tool-cache
    steps:
      - name: Prepare tool cache dir
        run: mkdir -p /tmp/runner-tool-cache
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          version: v1.7.0
          install_only: "true"
          skip_packaging: "true"
      - name: Assert cr tool was installed
        run: |
          if ! command -v cr &>/dev/null; then
            echo "FAIL: cr binary not found in PATH"
            exit 1
          fi
          echo "PASS: cr is installed (skip_packaging input accepted)"
